version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: pemsd7_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: mon-mongo-express
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: pemsd7_mongodb
    depends_on:
      - mongodb                                  

  backend:
    build: ./backend
    container_name: pemsd7_backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - ./data:/app/data  

  frontend:
    build: ./frontend
    container_name: pemsd7_frontend
    ports:
      - "8080:80" # port 8080 
    depends_on:
      - backend

volumes:
  mongo_data: